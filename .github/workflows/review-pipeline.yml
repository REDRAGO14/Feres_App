name: Feres CLI Review Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Compile CLI Core
        run: |
          mkdir -p out
          javac -d out src/feres/*.java
          echo "✅ Compilation Successful: CLI OOP Structure Verified."

      - name: Run Polymorphism Verification
        run: |
          # This verifies that your superclass references and overriding are active
          java -cp out feres.Main <<EOF
          4
          EOF
          echo "✅ Runtime Check: Main class executed and exited successfully."

      - name: Automated Feedback
        if: success()
        run: echo "PR Review Passed. All core OOP requirements (Inheritance, Polymorphism) are structurally sound."

      - name: Failure Notification
        if: failure()
        run: echo "❌ PR Review Failed. Please check for compilation errors in your CLI logic."