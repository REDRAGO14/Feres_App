name: Feres PR Review Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  review-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'

      - name: Compile Project
        run: |
          mkdir -p out
          javac -d out src/feres/*.java
          echo "✅ Compilation Passed: Code is syntactically correct."

      - name: Run Unit Tests
        run: |
          # We create one simple Test class to verify the core logic
          cat <<EOF > src/feres/FeresTest.java
          package feres;
          public class FeresTest {
              public static void main(String[] args) {
                  System.out.println("Running Unit Tests...");
          
                  // Test 1: Polymorphism & Fare Calculation
                  Vehicle v = new CargoRide("AA-1", "Biruk", 10.0, 50.0);
                  if (v.calculateFare(10) > 100.0) {
                      System.out.println("✅ Test 1 Passed: Polymorphism detected.");
                  } else {
                      System.out.println("❌ Test 1 Failed!");
                      System.exit(1);
                  }

                  // Test 2: Encapsulation
                  Vehicle v2 = new Vehicle("AA-2", "Henok", -5.0);
                  if (v2.getRatePerKm() > 0) {
                      System.out.println("✅ Test 2 Passed: Encapsulation logic active.");
                  } else {
                      System.out.println("❌ Test 2 Failed!");
                      System.exit(1);
                  }
          
                  System.out.println("All Tests Passed Successfully.");
              }
          }
          EOF
          javac -d out -cp out src/feres/FeresTest.java
          java -cp out feres.FeresTest
      - name: Validate Naming Conventions
        run: |
          echo "Checking Java naming conventions..."
          INVALID_FILES=0
          
          # Loop through all Java files in the feres package
          for file in src/feres/*.java; do
            filename=$(basename "$file")
          
            # Regex check: Does the filename start with a Lowercase letter?
            if [[ $filename =~ ^[a-z] ]]; then
              echo "❌ ERROR: $filename does not follow PascalCase (e.g., should be Main.java, not main.java)"
              INVALID_FILES=$((INVALID_FILES + 1))
            fi
          done

          if [ $INVALID_FILES -gt 0 ]; then
            echo "Total naming errors found: $INVALID_FILES"
            exit 1
          else
            echo "✅ All files follow standard Java naming conventions."
          fi

      - name: Automated Feedback
        if: success()
        run: |
          echo "### 🚀 Automated PR Review Passed" >> $GITHUB_STEP_SUMMARY
          echo "The code has passed compilation and core OOP unit tests." >> $GITHUB_STEP_SUMMARY

      - name: Failure Notification
        if: failure()
        run: echo "❌ PR Review Failed. Check the logs for errors."